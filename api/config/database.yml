# PostgreSQL. Rails also honors DATABASE_URL when it is present.
#
# Local defaults assume a Homebrew/Postgres.app server using the current macOS user.
# Override with DATABASE_HOST, DATABASE_PORT, DATABASE_USERNAME, DATABASE_PASSWORD,
# DATABASE_NAME, and DATABASE_TEST_NAME when needed.

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV["DATABASE_HOST"] %>
  port: <%= ENV["DATABASE_PORT"] %>
  username: <%= ENV["DATABASE_USERNAME"] %>
  password: <%= ENV["DATABASE_PASSWORD"] %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "household_cfo_api_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_TEST_NAME", "household_cfo_api_test") %>

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME", "household_cfo_api_production") %>
    username: <%= ENV.fetch("DATABASE_USERNAME", "household_cfo_api") %>
    password: <%= ENV["DATABASE_PASSWORD"] || ENV["HOUSEHOLD_CFO_API_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: <%= ENV.fetch("CACHE_DATABASE_NAME", "household_cfo_api_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV.fetch("QUEUE_DATABASE_NAME", "household_cfo_api_production_queue") %>
    migrations_paths: db/queue_migrate
