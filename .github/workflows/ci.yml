name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rails_security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: api

      - name: Scan Rails code with Brakeman
        run: bin/brakeman --no-pager

      - name: Scan gems with bundler-audit
        run: bin/bundler-audit check --update

  rails_lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: api

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('api/.ruby-version', 'api/.rubocop.yml', 'api/Gemfile.lock') }}
        with:
          path: api/${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint Rails code
        run: bin/rubocop -f github

  rails_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_TEST_NAME: household_cfo_api_test
    steps:
      - name: Install PostgreSQL client libraries
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev
        working-directory: .

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: api

      - name: Prepare database
        run: bin/rails db:prepare

      - name: Run Rails tests
        run: bin/rails test

      - name: Check Zeitwerk autoloading
        run: bin/rails zeitwerk:check

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Lint web app
        run: npm run lint

      - name: Run design regression checks
        run: npm test

      - name: Build web app
        run: npm run build

      - name: Run rendered desktop and mobile browser checks
        run: npm run test:browser

      - name: Audit web dependencies
        run: npm audit --audit-level=moderate
